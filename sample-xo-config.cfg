# Xen Orchestra Installation Configuration
# Copy this file to xo-config.cfg and modify as needed
# =====================================================

# Config schema version — do not modify manually
CONFIG_VERSION=2

# HTTP port for Xen Orchestra web interface
HTTP_PORT=80

# HTTPS port for Xen Orchestra web interface
HTTPS_PORT=443

# Installation directory for Xen Orchestra
INSTALL_DIR=/opt/xen-orchestra

# SSL certificate directory
SSL_CERT_DIR=/etc/ssl/xo

# SSL certificate file names
SSL_CERT_FILE=xo-cert.pem
SSL_KEY_FILE=xo-key.pem

# Git branch to use (master, stable, or specific tag)
# - master: Latest development version with newest features
GIT_BRANCH=master

# Backup directory for updates
# Backups are created automatically before updates and rebuilds
BACKUP_DIR=/opt/xo-backups

# Number of backups to keep
# Older backups are automatically purged after this limit
BACKUP_KEEP=5

# Node.js version to install (e.g. 24, 24.15)
# Use a major version (e.g. 24) to get the latest in that series via NodeSource,
# or a specific minor/patch (e.g. 24.15) to download that exact version from nodejs.org.
# Default: 24 (current LTS as of 2026; Node 20 reached end-of-life in April 2026)
# Note: Xen Orchestra uses Yarn Classic v1, which the script installs via corepack
# (the npm-bundled package manager) so it works correctly with Node.js 22 and 24+.
NODE_VERSION=24

# Service user (leave empty or set to "root" to run as root)
# You can use any username here - the script will create the user if needed.
#
# Per official XO docs, running as a non-root user is recommended for security.
# Ref: https://docs.xen-orchestra.com/installation#from-the-sources
#
# When SERVICE_USER is set to a non-root user:
# - The user is created if needed
# - Sudo is configured for mount/umount/findmnt only (per official docs)
# - CAP_NET_BIND_SERVICE is granted for binding to ports 80/443
# - Set useSudo = true in XO's config.toml for NFS/CIFS remote mounts
# - If ENCRYPT_REDIS_CREDENTIALS=true, the installer also adds the user to a
#   'xenstore' group and installs a udev rule so it can reach XenStore (the
#   xenbus device is root-only by default). See the encryption section below.
#
# Note: VMware/ESXi V2V import (nbdinfo/nbdkit/VDDK) requires root (UID 0).
# If you need VMware V2V, set SERVICE_USER=root.
#
# Either choice supports credential encryption (see ENCRYPT_REDIS_CREDENTIALS):
# root reaches XenStore directly; for a non-root user the installer grants the
# XenStore access automatically. Non-root remains the recommended default.
#
# Default: xo-service (non-root, per official documentation recommendation)
SERVICE_USER=xo-service

# Enable debug mode (true/false)
# Shows additional logging information
DEBUG_MODE=false

# Preferred text editor for editing configuration files
# Options: nano, vim
# The script will check if the editor is installed before use
# and prompt to install it if missing.
PREFERRED_EDITOR=nano

# =====================================================
# REVERSE PROXY CONFIGURATION
# =====================================================
# These options are for users who want to use an external reverse proxy
# (nginx, Apache, Caddy, etc.) instead of exposing XO directly.
#
# Typical reverse proxy setup:
# 1. Set non-privileged ports (e.g., HTTP_PORT=8080, HTTPS_PORT=8443)
# 2. Configure REVERSE_PROXY_TRUST with your proxy's IP address
# 3. Optionally set BIND_ADDRESS=127.0.0.1 if proxy is on the same host
# 4. Set REDIRECT_TO_HTTPS=true if you want HTTP to redirect to HTTPS
# 5. Configure your external reverse proxy to forward to XO's ports
#
# Example for nginx on same host:
#   HTTP_PORT=8080
#   HTTPS_PORT=8443
#   BIND_ADDRESS=127.0.0.1
#   REVERSE_PROXY_TRUST=127.0.0.1
#   REDIRECT_TO_HTTPS=false
#
# Example for nginx on different host:
#   HTTP_PORT=8080
#   HTTPS_PORT=8443
#   BIND_ADDRESS=0.0.0.0
#   REVERSE_PROXY_TRUST=192.168.1.100
#   REDIRECT_TO_HTTPS=false

# Bind address for HTTP/HTTPS listeners
# - 0.0.0.0: Listen on all network interfaces (default)
# - 127.0.0.1: Listen only on localhost (use with reverse proxy on same host)
# - Specific IP: Listen only on that network interface
BIND_ADDRESS=0.0.0.0

# Redirect all HTTP traffic to HTTPS (true/false)
# Note: This is XO's internal redirect. If using a reverse proxy,
# you may want to handle HTTPS redirect at the proxy level instead.
REDIRECT_TO_HTTPS=false

# Trust X-Forwarded-* headers from reverse proxy
# Options:
#   false = Do not trust forwarded headers (default, no reverse proxy)
#   true = Trust headers from all sources (NOT RECOMMENDED - security risk)
#   IP address(es) = Trust only from specific IPs (e.g., 127.0.0.1 or 192.168.1.100)
#
# For multiple IPs, separate with spaces: REVERSE_PROXY_TRUST="127.0.0.1 192.168.1.1"
# Leave as 'false' if not using a reverse proxy.
# Set to your reverse proxy's IP address if using one.
REVERSE_PROXY_TRUST=false

# Public URL advertised to external entities (e.g. XO Lite)
# Set this when the host's IP address is not how clients should reach XO —
# for example when XO is behind a reverse proxy or accessed via a domain name.
# Leave commented to omit it (a commented placeholder is written to config.toml).
#
# Example:
#   PUBLIC_URL=https://xo.example.com
# PUBLIC_URL=

# Redis connection settings (advanced users only)
# Leave commented to use default: redis://localhost:6379/0
#
# Examples:
#   REDIS_URI=redis://localhost:6379/0
#   REDIS_URI=redis://redis.company.lan:6379/42
#   REDIS_SOCKET=/var/run/redis/redis.sock
#
# REDIS_URI=
# REDIS_SOCKET=

# Encrypt credentials stored in Redis at rest using AES-256-GCM (true/false)
# When enabled, xo-server encrypts all credential records in Redis on next
# startup and can decrypt them again if you set this back to false.
#
# ⚠️  IMPORTANT: This feature only works when XO runs as a VM on a
#     XenServer/XCP-ng host and can execute xenstore-read / xenstore-write.
#     It does NOT work on bare metal or on non-XCP-ng hypervisors (KVM,
#     VMware, Hyper-V, etc.) because half of the encryption key is stored
#     in XenStore. Leave this 'false' unless XO is an XCP-ng guest.
#
# Service user (see SERVICE_USER above) — XenStore access is required either way:
#   - SERVICE_USER=root: works directly; root can read/write the xenbus device.
#   - non-root SERVICE_USER: the xenbus device is root-only by default, so the
#     installer adds the user to a 'xenstore' group and installs a udev rule
#     granting access. This keeps the recommended non-root setup while still
#     allowing encryption. (Without this, xo-server cannot derive the key and
#     enters degraded mode — logins are rejected.)
#
# Opt out at any time by setting this to false and restarting xo-server —
# it will decrypt the records and remove the key files automatically.
# Default: false
ENCRYPT_REDIS_CREDENTIALS=false

# =====================================================
# WARNING SUPPRESSION AND LICENSE CONTROL
# =====================================================
# These options allow you to disable certain warnings
# and license checks. Use with caution!

# Disable warnings during installation and operation (true/false)
# ⚠️  WARNING: Disabling warnings may hide important issues that could affect
#     your installation stability, security, or functionality. Only disable
#     if you understand the risks and have reviewed relevant warnings.
# Default: false
DISABLE_WARNINGS=false

# Disable license checks on XO Proxy appliances (true/false)
# This is useful when using xo-cli for proxy installation from sources.
# ⚠️  WARNING: Disabling license checks bypasses important license verification.
#     This should only be used in authorized testing/development environments
#     or when explicitly permitted by your license agreement. Unauthorized
#     license bypass may violate licensing terms.
# Default: false
DISABLE_LICENSE_CHECK=false

# =====================================================
# RUNNING TASK CHECK (Update Safety)
# =====================================================
# Before updating, the script can query the XO REST API for active tasks
# (e.g. running backups) and abort the update if any are found.
#
# Authentication can be configured here or entered interactively at runtime.
# If both XO_TASK_CHECK_TOKEN and credentials are set, the token takes priority.
# If nothing is configured here, the script will prompt for credentials.
#
# IMPORTANT: Only admin-level XO accounts can access the REST API.
#
# It is recommended to create a dedicated XO web UI account solely for this
# purpose (e.g. "task-checker@local.net") with admin privileges. Using a
# dedicated account prevents the credentials/token from being tied to a
# personal account and provides clear audit trail accountability.
# The dedicated account only needs to exist in XO — it does not need shell
# access, SSH keys, or any OS-level permissions.
#
# To create an authentication token you have two options:
#
# OPTION 1 — XO web UI (recommended):
#   Open your user menu (top-right username) → Tokens → New token.
#   (Exact location varies by XO version; look for the "Tokens" page under
#   your account, with columns Token / Description / Last use / Expiration.)
#   Give it a description (e.g. "installer-task-check") and copy the token value.
#
# OPTION 2 — curl (include a description in the request body):
#   curl -X POST -u 'task-checker@local.net:yourpassword' \
#     https://localhost/rest/v0/users/me/authentication_tokens \
#     -H 'Content-Type: application/json' \
#     -d '{"description":"installer-task-check"}' -k
#
# Copy the "id" field from the response — that is the value to use below.
# Tokens expire after 30 days by default.
#
# *** IMPORTANT — TOKENS MUST HAVE A DESCRIPTION TO SURVIVE UPDATES ***
#
# During an update the installer flushes stale session tokens from Redis to
# prevent schema-mismatch 401 errors. It identifies tokens to keep by
# checking for a non-empty "description" field in the token's stored JSON.
#
#   - Tokens WITH a description  → treated as API/integration tokens → KEPT
#   - Tokens WITHOUT a description → treated as browser session tokens → DELETED
#
# If XO_TASK_CHECK_TOKEN was created without a description it will be wiped on
# the next update and will need to be recreated. Always use a description.
# The same rule applies to any other API tokens used by third-party tools
# (monitoring agents, Terraform, scripts, etc.) that connect to this XO server.

# Authentication token for XO REST API (recommended over credentials)
# This is more secure than storing a password, and tokens can be revoked
# independently without changing the account password.
# Example: XO_TASK_CHECK_TOKEN=UlTBEnFeL12XocK-7Qx-DKvOYbPn0eG7Z2oMvOniNjg
#XO_TASK_CHECK_TOKEN=

# XO web UI credentials (alternative to token)
# Example: XO_TASK_CHECK_USER=task-checker@local.net
# Example: XO_TASK_CHECK_PASS=changeme
#XO_TASK_CHECK_USER=
#XO_TASK_CHECK_PASS=
